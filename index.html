<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roast AI 🔥 | theroast-ai</title>
    <style>
        /* Modern Dark Theme Design */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0d1117; /* GitHub Dark Theme Color */
            color: #c9d1d9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-card {
            background: #161b22;
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { color: #ff4500; margin-bottom: 5px; font-size: 28px; }
        p.subtitle { color: #8b949e; font-size: 14px; margin-bottom: 25px; }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #0d1117;
            border: 2px solid #30363d;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ff4500;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff4500, #ff8c00);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 69, 0, 0.4);
        }

        #response-box {
            margin-top: 25px;
            padding: 15px;
            background: #21262d;
            border-radius: 10px;
            min-height: 50px;
            display: none; /* Starting mein hidden */
            border-left: 5px solid #ff4500;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #30363d;
            border-top: 4px solid #ff4500;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { margin-top: 20px; font-size: 12px; color: #484f58; }
    </style>
</head>
<body>

<div class="chat-card">
    <h1>🔥 Roast AI</h1>
    <p class="subtitle">Timepass ho ya content creation, full maza aayega!</p>

    <div class="input-group">
        <input type="text" id="userInput" placeholder="Yahan kuch likho aur roast khao..." onkeypress="handleEnter(event)">
    </div>

    <button onclick="askAI()" id="submitBtn">Roast Me! ⚡</button>

    <div id="loader" class="loader"></div>
    
    <div id="response-box">
        <strong style="color: #ff4500;">AI ka Jawab:</strong>
        <p id="responseText" style="margin-top: 10px; line-height: 1.6;"></p>
    </div>

    <footer>Powered by theroast-ai</footer>
</div>

<script>
    // Enter key dabane par bhi function chale
    function handleEnter(event) {
        if (event.key === "Enter") {
            askAI();
        }
    }

    async function askAI() {
        const inputField = document.getElementById("userInput");
        const responseBox = document.getElementById("response-box");
        const responseText = document.getElementById("responseText");
        const loader = document.getElementById("loader");
        const btn = document.getElementById("submitBtn");

        const message = inputField.value.trim();

        if (!message) {
            alert("Bhai, khali dimaag ki tarah box bhi khali mat chhod! Kuch likh.");
            return;
        }

        // UI Reset
        responseBox.style.display = "none";
        loader.style.display = "block";
        btn.disabled = true;
        btn.innerText = "Soch raha hoon...";

        try {
            // API Call with theroast-ai branding
            const url = `https://api.affiliateplus.xyz/api/chatbot?message=${encodeURIComponent(message)}&botname=theroast-ai&ownername=Suraj`;
            
            const response = await fetch(url);
            const data = await response.json();

            loader.style.display = "none";
            btn.disabled = false;
            btn.innerText = "Roast Me! ⚡";

            if (data && data.message) {
                responseBox.style.display = "block";
                responseText.innerText = data.message;
            } else {
                throw new Error("Invalid Response");
            }

        } catch (error) {
            loader.style.display = "none";
            btn.disabled = false;
            btn.innerText = "Roast Me! ⚡";
            responseBox.style.display = "block";
            responseText.innerText = "Lagta hai teri kismat kharab hai ya mera server behosh ho gaya! Dobara try kar. 💀";
        }
    }
</script>

</body>
</html>

<script>
    // Aapki Gemini API Key yahan set hai
    const API_KEY = "AIzaSyB_D05HI2FKeav9yurdHlbO-nErhlThaEM";

    async function generateRoast() {
        const userInput = document.getElementById("userInput").value;
        const responseText = document.getElementById("responseText");

        // Agar input khali hai
        if (!userInput || userInput.trim() === "") {
            alert("Abe kuch likh to sahi! Khali dimaag ki tarah khali box mat chhod.");
            return;
        }

        // Loading message dikhana
        responseText.innerText = "Ruk beta, tere liye kuch 'zeher' soch raha hoon... 🔥";

        try {
            const response = await fetch(`https://googleapis.com{API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ 
                            text: `System Instruction: You are a savage, funny, and extremely creative roasting AI. Give a unique, short, and hilarious roast in Hinglish (Hindi + English) based on the user's input. Never repeat your previous responses. Be unpredictable, witty, and very savage.

                            User Input: ${userInput}` 
                        }]
                    }],
                    generationConfig: {
                        temperature: 1.0, // Yeh har baar naya aur creative jawab dega
                        topP: 0.95,
                        maxOutputTokens: 150
                    }
                })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const roast = data.candidates[0].content.parts[0].text;
                responseText.innerText = roast;
            } else {
                responseText.innerText = "Lagta hai teri kismat hi kharab hai, AI ne bhi roast karne se mana kar diya!";
            }

        } catch (error) {
            console.error("Error:", error);
            responseText.innerText = "Abe yaar! Error aa gaya. Shayad tera internet bhi tera mazaak uda raha hai.";
        }
    }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roastery AI - Dost ki Bezatti</title>
    <style>
        /* Basic Design - Aap ise baad mein badal sakte hain */
        body { font-family: sans-serif; background-color: #121212; color: white; text-align: center; padding: 50px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(255,0,0,0.5); }
        input { padding: 10px; width: 80%; border-radius: 5px; border: none; margin-bottom: 20px; }
        button { padding: 10px 20px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #responseText { margin-top: 20px; font-size: 1.2rem; color: #ffcc00; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔥 Roastery AI 🔥</h1>
        <p>Doston ki bezatti ab AI karega!</p>
        
        <input type="text" id="userInput" placeholder="Apne dost ka naam ya kuch likho...">
        <br>
        <button onclick="generateRoast()">BEZATTI KARO</button>

        <div id="responseText">Roast yahan dikhega...</div>
    </div>

    <script>
        // Aapki Gemini API Key
        const API_KEY = "AIzaSyDoL9vySXpGqb1GXpUjQS2DbxkyaFs2KRE";

        async function generateRoast() {
            const userInput = document.getElementById("userInput").value;
            const responseText = document.getElementById("responseText");

            if (!userInput) {
                alert("Bhai, pehle kuch likh to sahi!");
                return;
            }

            responseText.innerText = "Ruk beta, tera mazaak taiyar ho raha hai... 💀";

            try {
                const response = await fetch(`https://googleapis.com{API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ 
                                text: `System Instruction: You are a savage roasting AI. Give a unique, short, and hilarious roast in Hinglish based on: ${userInput}. Never repeat previous jokes.` 
                            }]
                        }],
                        generationConfig: { temperature: 1.0 }
                    })
                });

                const data = await response.json();
                const roast = data.candidates[0].content.parts[0].text;
                responseText.innerText = roast;

            } catch (error) {
                responseText.innerText = "Error! Shayad tera internet bhi tera mazaak uda raha hai.";
            }
        }
    </script>

</body>
</html>
